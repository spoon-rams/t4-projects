<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TEST - Google My Maps</title>
    <link rel="stylesheet" href="../css/rebrand/r-style.css" />
    <link rel="stylesheet" href="../css/rebrand/r-t4extras.css" />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <main></main>
    <script src="app.js"></script>
  </body>
</html>

<section class="founders-slider <t4 type='content' name='Top/Bottom Spacing' output='normal' display_field='value' /> <t4 type='content' name='Limit Width' output='normal' display_field='value' />">
  <div class="slider-wrapper desktop">
    <!-- SLIDE ARROWS -->
    <div class="slide-arrow prev">&lsaquo;</div>
    <div class="slide-arrow next">&rsaquo;</div>
    <!-- SLIDE CONTAINER -->
    <div class="slides-container">
      <div class="slide">
        <div class="row">
          <div class="col-lg-12">
            <t4 type="content" name="Image" output="normal" formatter="image/normal" cdn="true" />

            <t4
              type="content"
              name="Title"
              output="selective-output"
              process-format="true"
              format='<div class="content">
          
          <div class="title">
            <span>$value</span>
          </div>
          
          <div class="description">
            <p><t4 type="content" name="Description" output="normal" modifiers="striptags,htmlentities" /></p>
          </div>
          
        </div>'
            />
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="slider-indicators"></div>
</section>
