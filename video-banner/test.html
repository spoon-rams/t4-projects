<div class="home-hero" role="banner">
  <video
    autoplay="autoplay"
    loop="loop"
    muted
    defaultMuted
    playsinline
    oncontextmenu="return false;"
    preload="auto"
    id="heroVideo"
    poster='<t4 type="media" id="133293" formatter="path/*" />'
  >
    <source
      src='<t4 type="content" name="Video URL" output="normal" modifiers="striptags,htmlentities" />'
      type="video/mp4"
    />
  </video>

  <div class="hero-banner__block">
    <t4
      type="content"
      name="Heading"
      output="selective-output"
      modifiers="striptags,htmlentities"
      format="<h2 class='hero-banner__block__title'><span>$value</span></h2>"
    />

    <div class="hero-banner__block__content">
      <t4
        type="content"
        name="Description"
        output="selective-output"
        modifiers="striptags,htmlentities"
        format="<p class='hero-banner__block__desc'>$value</p>"
      />

      <!-- <t4
        type="content"
        name="Linked Section"
        output="selective-output"
        modifiers="nav_sections"
        process-format="true"
        format='<a
        class="btn btn-primary"
        href=&#39;<t4 type="content" name="Linked Section" output="linkurl" modifiers="nav_sections" />&#39;
        tabindex="0"
        > <t4
          type="content"
          name="Button Text"
          output="normal"
          modifiers="striptags,htmlentities"
      /></a>'
      /> -->
     
      <t4
        type="content"
        name="Button Text"
        output="normal"
        modifiers="striptags,htmlentities"
      />
    </div>
  </div>
</div>
