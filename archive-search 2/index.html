<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSS EDITS -->
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/mobile.css" />

    <!-- CSS MAIN -->
    <link rel="stylesheet" href="../../css/t4extras.css" />
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="../../css/fu_ta.css" />

    <title>Archive Search</title>
  </head>
  <body>
    <main class="fullwidth" id="main-content">
      <section class="h1-heading">
        <h1>All Stories Archive - All/Search</h1>
      </section>
      <section class="archives-search">
        <div class="search-bar">
          <label for="archive-search">Title Search:</label>
          <input name="archive-search" type="text" id="search-input" placeholder="Search..." />
        </div>
        <div class="category-dropdown">
          <label for="category">Filter by Categories</label>
          <select name="category" id="category-select">
            <option value="">Please choose an category</option>
            <option value="arts and creativity">Arts and Creativity</option>
            <option value="research and science">Research and Science</option>
            <option value="campus life">Campus Life</option>
            <option value="business and entrepreneurshiip">Business and Entrepreneurshiip</option>
            <option value="theatre">Theatre</option>
            <option value="dance">Dance</option>
          </select>
        </div>
      </section>
      <section class="general-content fordham-stories-archives"></section>
      <div class="pagination"></div>
    </main>
  </body>
  <script type="text/javascript" src="./script.js"></script>
</html>
