<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSS PAGE FILES -->
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/mobile.css" />
    <!-- CSS MAIN -->
    <link rel="stylesheet" href="../css/t4extras.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/fu_ta.css" />
    <link rel="stylesheet" href="../css/fu_ta1.css" />
    <link rel="stylesheet" href="../css/subsite-t4extras.css" />
    <link rel="stylesheet" href="../css/fu_targetedannounce.css" />
    <link rel="stylesheet" href="../css/outage.css" />
    <link rel="stylesheet" href="../css/tinymce.css" />
    <!-- TEMPORARY -->
    <!-- <link rel="stylesheet" href="../css/temp.css" /> -->
    <title>Document</title>
  </head>
  <body>
    <section class="library-search sm-margin-divider side-divider">
      
      <div class="library-search__content-wrapper">
        <!-- SEARCH BUTTON BAR -->
        <div class="search-buttons">
          <a class="btn-primary btn enterprise" href="https://fdhm.ent.sirsi.net/client/en_US/default">Library Catalog</a>
          <a class="btn-primary btn database" href="https://fordham.libguides.com/az.php">Database</a>
          <a class="btn-primary btn e-journal" href="https://cn9ex9vq2w.search.serialssolutions.com/">E-Journal</a>
          <a class="btn-primary btn ask-librarian">Ask a Librarian</a>
          <a class="btn-primary btn digital-collections">Digital Collections</a>
          <a class="btn-primary btn fordham-commons">Fordham Research Commons</a>
        </div>

        <!-- ONESEARCH EBSCO SEARCH FORM -->
        <div class="onesearch">
          <div class="onesearch-form">
            <form class="ebsco-single-search" action="https://searchbox.ebsco.com/search/" target="_self">
              <input name="schemaId" type="hidden" value="search" />
              <input name="custid" type="hidden" value="s8944763" />
              <input name="groupid" type="hidden" value="main" />
              <input name="profid" type="hidden" value="eds" />
              <input name="proxy" type="hidden" value="https://login.avoserv2.library.fordham.edu/login?url={targetURL}" />
              <input name="scope" type="hidden" value="site" />
              <input name="site" type="hidden" value="eds-live" />
              <input name="direct" type="hidden" value="true" />
              <input id="eb-sbb-search-input" name="bquery" type="text" placeholder="Search books, articles, media and more..." />
              <button class="btn btn-primary" type="submit" value="Search">OneSearch</button>
            </form>
          </div>
          <!-- WHAT IS ONESEARCH LINK -->
          <div class="what-is-onesearch">
            <a href="#">What is OneSearch?</a>
          </div>
        </div>

        <!-- ONESEACH ADVANCE LINK -->
        <div class="onesearch__advanced-link">
          <a
            class="eb-adv-search__link"
            href="https://searchbox.ebsco.com/search/?&amp;schemaId=search&amp;custid=s8944763&amp;groupid=main&amp;profid=eds&amp;proxy=https%3A%2F%2Flogin.avoserv2.library.fordham.edu%2Flogin%3Furl%3D%7BtargetURL%7D&amp;setup=1&amp;scope=site&amp;site=eds-live&amp;direct=true"
            target="_self"
            >OneSearch Advanced</a
          >
        </div>
      </div>

    </section>
  </body>
  <script src="script.js"></script>
</html>
