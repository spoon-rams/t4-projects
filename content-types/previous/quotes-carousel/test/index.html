<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <title>Profile Carousel</title>
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center">Profile Carousel</h1>
        <div id="profile-carousel" class="carousel slide" data-ride="carousel">
            <ol class="carousel-indicators">
                <li data-target="#profile-carousel" data-slide-to="0" class="active"></li>
                <li data-target="#profile-carousel" data-slide-to="1"></li>
                <li data-target="#profile-carousel" data-slide-to="2"></li>
            </ol>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://via.placeholder.com/600x400?text=Profile+1" alt="Profile 1" class="d-block w-100">
                    <div class="carousel-caption">
                        <h3>John Doe</h3>
                        <p>Web Developer</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="https://via.placeholder.com/600x400?text=Profile+2" alt="Profile 2" class="d-block w-100">
                    <div class="carousel-caption">
                        <h3>Jane Smith</h3>
                        <p>Graphic Designer</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="https://via.placeholder.com/600x400?text=Profile+3" alt="Profile 3" class="d-block w-100">
                    <div class="carousel-caption">
                        <h3>Robert Johnson</h3>
                        <p>Software Engineer</p>
                    </div>
                </div>
            </div>
            <a class="carousel-control-prev" href="#profile-carousel" role="button" data-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="sr-only">Previous</span>
            </a>
            <a class="carousel-control-next" href="#profile-carousel" role="button" data-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="sr-only">Next</span>
            </a>
        </div>
    </div>
</body>
</html>
