<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <!-- CSS EDITS -->
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/mobile.css" />

    <!-- CSS MAIN -->
    <link rel="stylesheet" href="../../css/t4extras.css" />
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="../../css/fu_ta.css" />
    <link rel="stylesheet" href="../../css/fu_ta1.css" />
    <link rel="stylesheet" href="../../css/subsite-t4extras.css" />
    <link rel="stylesheet" href="../../css/fu_targetedannounce.css" />
    <link rel="stylesheet" href="../../css/outage.css" />
    <link rel="stylesheet" href="../../css/tinymce.css" />
    <!-- TEMPORARY -->
    <!-- <link rel="stylesheet" href="../css/temp.css" /> -->
  <title>Document</title>
</head>
<body>
  <section class="banner-img-txt <t4 type="content" name="Top / Bottom Spacing" output="normal" display_field="value" /> <t4 type="content" name="Limit Width" output="normal" display_field="value" />">
  <div class="row">
    <div class="banner-img-txt__col col-lg-7">
      <div class="banner-img-txt__img">
        <img srcset="<t4 type="content" name="Image" output="normal" formatter="path/*" cdn="true" />,
                  <t4 type="content" name="Image" output="normal" formatter="path/*" cdn="true" pxl-filter-id="13" /> 0.5x,
                  <t4 type="content" name="Image" output="normal" formatter="path/*" cdn="true" pxl-filter-id="6" /> 1x,
                  <t4 type="content" name="Image" output="normal" formatter="path/*" cdn="true" pxl-filter-id="5" /> 1.5x,
                  <t4 type="content" name="Image" output="normal" formatter="path/*" cdn="true" pxl-filter-id="4" /> 2x"
             src="<t4 type="content" name="Image" output="normal" formatter="path/*" cdn="true" />"
             alt="<t4 type="content" name="Image" output="normal" formatter="image/description" cdn="true" pxl-filter-id="4" />">
      </div>
    </div>

    <div class="banner-img-txt__col col-lg-5">
      <div class="banner-img-txt__block">
        <t4 type="content" name="Category" output="selective-output" process-format="true" format="<span class=&quot;banner-img-txt__block__label&quot;><t4 type=&quot;content&quot; name=&quot;Category&quot; output=&quot;normal&quot; modifiers=&quot;striptags,htmlentities&quot; /></span>" />

        <t4 type="content" name="Title" output="selective-output" process-format="true" format="<h2 class=&quot;banner-img-txt__block__title&quot;>
          <span><t4 type=&quot;content&quot; name=&quot;Title&quot; output=&quot;normal&quot; modifiers=&quot;striptags,htmlentities&quot; /></span>
        </h2>" />

        <div class="banner-img-txt__block__content">
          <t4 type="content" name="Teaser" output="selective-output" process-format="true" format="<p>$value</p>" />

          <t4 type="content" name="Link Text" output="selective-output" process-format="true" format="<a href=&quot;<t4 type=&quot;content&quot; name=&quot;link (external)&quot; output=&quot;normal&quot; modifiers=&quot;striptags,htmlentities&quot; /><t4 type=&quot;content&quot; name=&quot;link (internal)&quot; output=&quot;linkurl&quot; modifiers=&quot;nav_sections&quot; />&quot; class=&quot;banner-img-txt__block__link&quot;>
            <span><t4 type=&quot;content&quot; name=&quot;Link Text&quot; output=&quot;normal&quot; modifiers=&quot;striptags,htmlentities&quot; /></span>
            <svg class=&quot;svg-md-24px&quot; focusable=&quot;false&quot; aria-hidden=&quot;true&quot;>
              <title>Arrow right icon</title>
              <use xlink:href=&quot;<t4 type=&quot;media&quot; formatter=&quot;path/*&quot; id=&quot;10757&quot; />#ic_keyboard_arrow_right_24px&quot;></use>
            </svg>
          </a>" />
        </div>
      </div>
    </div>
  </div>
</section>
</body>
</html>
